name: Tests

# Lightweight CI: runs the unit + integration test suite on every push/PR.
# No cloud credentials or secrets required — chDB runs in-process and the
# network-dependent tests are opt-in (marked `network`, skipped by default).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q
